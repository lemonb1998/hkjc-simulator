
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKJC Racing Simulator 進階版</title>
<style>
:root{--bg:#0b111a;--panel:#162436;--panel-hover:#1f334d;--primary:#2563eb;--green:#10b981;--red:#ef4444;--gold:#f59e0b;--text:#f8fafc;--text-dim:#94a3b8;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}
button,input,select{font:inherit;outline:none}
/* Header */
header{background:#0f172a;border-bottom:1px solid var(--border);padding:15px 20px;display:flex;gap:15px;align-items:center;flex-wrap:wrap}
header input,header select{background:#1e293b;color:#fff;border:1px solid var(--border);padding:8px 12px;border-radius:6px}
.btn{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-weight:600;transition:0.2s}
.btn:hover{filter:brightness(1.2)}
.btn-green{background:var(--green)}
.btn-gold{background:var(--gold);color:#000}
.btn-red{background:var(--red)}
.chip-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:bold;transition:0.2s;margin:0 2px}
.chip-btn:hover{background:var(--panel-hover)}
.chip-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
/* Main Layout */
.main{display:flex;flex:1;overflow:hidden}
.left{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.right{width:380px;background:#0f172a;display:flex;flex-direction:column}

/* Video Phase */
#videoPhase{display:none;flex:1;flex-direction:column;background:#000;position:relative}
#videoPhase iframe{flex:1;width:100%;border:none}
.settle-bar{background:#1e293b;padding:20px;text-align:center}
.btn-huge{font-size:20px;padding:15px 40px;background:var(--gold);color:#000;border-radius:8px;box-shadow:0 4px 15px rgba(245,158,11,0.3);animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

/* Betting Phase */
#betPhase{display:flex;flex-direction:column;flex:1;overflow:hidden}
.tabs{display:flex;background:#1e293b}
.tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:bold;color:var(--text-dim);border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--panel)}

.board{flex:1;overflow-y:auto;padding:20px;display:none;gap:10px;flex-direction:column}
.board.active{display:flex}

/* Chip Selector */
.chip-selector{display:flex;justify-content:center;background:var(--panel);padding:10px;border-radius:8px;margin-bottom:15px}

/* Single Board */
.horse-row{display:flex;background:var(--panel);border-radius:8px;border:1px solid var(--border);overflow:hidden}
.h-info{width:120px;padding:10px;background:rgba(0,0,0,0.2);display:flex;align-items:center;gap:15px}
.h-no{font-size:24px;font-weight:900;color:var(--gold)}
.h-name{font-size:14px;font-weight:bold}
.odds-btn{flex:1;padding:10px;text-align:center;cursor:pointer;border-left:1px solid var(--border);transition:0.2s;display:flex;flex-direction:column;justify-content:center}
.odds-btn:hover{background:var(--panel-hover)}
.odds-type{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.odds-val{font-size:18px;font-weight:bold}

/* Matrix Board */
.matrix-control{display:flex;justify-content:center;gap:20px;margin-bottom:15px;}
.pool-btn{background:#1e293b;color:#fff;border:1px solid var(--border);padding:8px 20px;border-radius:20px;cursor:pointer;font-weight:bold;transition:0.2s}
.pool-btn.active{background:var(--primary);border-color:var(--primary)}

.matrix{display:grid;gap:2px;grid-template-columns:auto repeat(14, 1fr);overflow-x:auto}
.m-hdr{background:#0f172a;text-align:center;padding:10px 5px;font-weight:bold;font-size:12px;display:flex;align-items:center;justify-content:center}
.m-cell{background:var(--panel);border:1px solid var(--border);border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50px;transition:0.2s}
.m-cell:hover{background:var(--panel-hover)}
.m-cell.empty{background:transparent;border:none;cursor:default}
.m-val{font-size:14px;font-weight:bold}
.m-label{font-size:10px;color:var(--text-dim)}

/* Right Panel Tabs */
.right-tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border)}
.right-tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:bold;color:var(--text-dim)}
.right-tab.active{color:var(--gold);background:var(--panel-hover)}

.right-panel{display:flex;flex-direction:column;flex:1;overflow:hidden}
.right-content{display:none;flex:1;overflow-y:auto;padding:10px}
.right-content.active{display:block}

/* Bet Slip */
.slip-hdr{padding:15px;border-bottom:1px solid var(--border);text-align:center;font-size:16px;font-weight:bold;color:var(--gold)}
.bet-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;position:relative}
.bet-item .del{position:absolute;top:10px;right:10px;color:var(--red);cursor:pointer;font-weight:bold}
.b-title{font-size:14px;font-weight:bold;margin-bottom:5px}
.b-odds{color:var(--gold);font-size:16px;font-weight:bold}
.b-amount{font-size:12px;color:var(--text-dim);margin-top:5px}

/* History */
.history-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
.history-item.win{border-left:4px solid var(--green)}
.history-item.loss{border-left:4px solid var(--red)}
.history-summary{font-size:24px;font-weight:bold;text-align:center;margin:20px 0}
.history-win{color:var(--green)}
.history-loss{color:var(--red)}

/* Slip Footer */
.slip-footer{padding:15px;border-top:1px solid var(--border);background:#1e293b}
.credit-box{display:flex;justify-content:space-between;margin-bottom:10px;font-size:16px}
.total-box{display:flex;justify-content:space-between;margin-bottom:10px;font-size:18px;font-weight:bold;color:var(--gold)}
.btn-confirm{width:100%;font-size:16px;padding:12px;background:var(--green);margin-top:10px}
.btn-bankrupt{width:100%;font-size:14px;padding:8px;background:var(--red);margin-top:5px;color:#fff;border:none;border-radius:4px;cursor:pointer}

/* Result Overlay */
#resultOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(11,17,26,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px}
.r-card{background:var(--panel);border:2px solid var(--gold);border-radius:12px;padding:30px;width:100%;max-width:600px;text-align:center}
.r-title{font-size:32px;color:var(--gold);margin-bottom:20px}
.r-top4{display:flex;justify-content:center;gap:15px;margin-bottom:30px}
.r-horse{background:#0f172a;padding:15px 25px;border-radius:8px;border:1px solid var(--border)}
.r-horse .r-rank{font-size:12px;color:var(--text-dim);margin-bottom:5px}
.r-horse .r-no{font-size:28px;font-weight:bold;color:#fff}
.r-payout{font-size:24px;margin-bottom:20px}
.r-payout span{color:var(--green);font-size:36px;font-weight:900}
</style>
</head>
<body>
<header>
    <h2>🐎 HKJC 模擬器 進階版</h2>
    <input type="date" id="dateInput" value="2026-04-12">
    <select id="venueInput"><option value="ST">沙田 ST</option><option value="HV">跑馬地 HV</option></select>
    <input type="number" id="raceNoInput" value="2" min="1" max="14" style="width:60px">
    <button class="btn" onclick="loadRace()">載入賽事</button>
    <span id="status" style="margin-left:auto;color:var(--text-dim)">請載入賽事...</span>
</header>

<div class="main">
    <div class="left">
        <div id="betPhase">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('single')">獨贏 / 位置</div>
                <div class="tab" onclick="switchTab('double')">連贏 / 位置Q</div>
            </div>

            <!-- 籌碼選擇器 -->
            <div class="chip-selector" id="chipSelector" style="display:none">
                <div class="chip-btn" onclick="setStake(10)">$10</div>
                <div class="chip-btn" onclick="setStake(50)">$50</div>
                <div class="chip-btn" onclick="setStake(100)">$100</div>
                <div class="chip-btn" onclick="setStake(500)">$500</div>
                <div class="chip-btn" onclick="setStake('all')">All In</div>
            </div>

            <div id="singleBoard" class="board active"></div>
            <div id="doubleBoard" class="board">
                <div style="text-align:center;margin-bottom:10px;color:var(--gold)">* 以下賠率為智能模擬，結算時將以香港賽馬會官方真實派彩為準。</div>
                <div class="matrix-control">
                    <button class="pool-btn active" id="btnQIN" onclick="switchMatrix('QIN')">連贏 (QIN)</button>
                    <button class="pool-btn" id="btnQPL" onclick="switchMatrix('QPL')">位置Q (QPL)</button>
                </div>
                <div class="matrix" id="qinMatrix"></div>
            </div>
        </div>

        <div id="videoPhase">
            <iframe id="videoIframe" allowfullscreen></iframe>
            <div class="settle-bar">
                <button class="btn btn-huge" onclick="showResults()">🏁 睇完賽事，點擊結算</button>
            </div>
        </div>

        <div id="resultOverlay">
            <div class="r-card">
                <div class="r-title">賽事結果</div>
                <div class="r-top4" id="rTop4"></div>
                <div class="r-payout">你贏得: <br><span id="rWinMoney">$0.00</span></div>
                <button class="btn btn-huge" onclick="resetGame()">再玩下一場</button>
            </div>
        </div>
    </div>

    <!-- 右邊面板：彩票 + 歷史紀錄 -->
    <div class="right">
        <div class="right-tabs">
            <div class="right-tab active" onclick="switchRightTab('slip')">🧾 彩票</div>
            <div class="right-tab" onclick="switchRightTab('history')">📊 紀錄</div>
        </div>

        <div class="right-panel">
            <!-- 彩票面板 -->
            <div id="slipPanel" class="right-content active">
                <div class="slip-hdr">當前彩票</div>
                <div id="betSlipList"></div>
                <div class="slip-footer">
                    <div class="credit-box">
                        <span>本金:</span> 
                        <span style="color:var(--green)">$<span id="credit">1000.00</span></span>
                    </div>
                    <div class="total-box">
                        <span>總注金:</span> 
                        <span>$<span id="totalStake">0.00</span></span>
                    </div>
                    <button class="btn-confirm" onclick="startRace()">🔒 確認下注並開跑</button>
                    <button class="btn-bankrupt" onclick="resetBankroll()">💸 重新注資 $1000</button>
                </div>
            </div>

            <!-- 歷史紀錄面板 -->
            <div id="historyPanel" class="right-content">
                <div class="history-summary">
                    <div>總盈虧: $<span id="totalPnL" class="history-win">+0.00</span></div>
                    <div>勝率: <span id="winRate">0%</span></div>
                </div>
                <div id="historyList">
                    <div style="text-align:center;color:var(--text-dim);padding:40px">載入中...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 遊戲狀態全域變數
let raceData = null;
let credit = 1000.00;
let betSlip = [];
let currentStake = 10;
let bettingHistory = [];
let currentDoublePool = 'QIN';

// 本地儲存 Key
const STORAGE_CREDIT = 'hkjc_credit';
const STORAGE_HISTORY = 'hkjc_history';

// 初始化
function initGame() {
    credit = parseFloat(localStorage.getItem(STORAGE_CREDIT)) || 1000.00;
    document.getElementById('credit').textContent = credit.toFixed(2);

    const savedHistory = localStorage.getItem(STORAGE_HISTORY);
    if (savedHistory) {
        bettingHistory = JSON.parse(savedHistory);
        updateHistoryDisplay();
    }

    updateChipSelector();
}

// 籌碼功能
function setStake(amount) {
    if (amount === 'all') {
        currentStake = Math.floor(credit / 10) * 10;
    } else {
        currentStake = amount;
    }
    updateChipSelector();
    updateSlip();
}

function updateChipSelector() {
    document.querySelectorAll('.chip-btn').forEach(btn => {
        btn.classList.remove('active');
        if (parseInt(btn.textContent.slice(1)) === currentStake || btn.textContent === '$' + currentStake) {
            btn.classList.add('active');
        }
    });
}

// 右邊面板 Tab 切換
function switchRightTab(tab) {
    document.querySelectorAll('.right-tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.right-content').forEach(el => el.classList.remove('active'));

    if (tab === 'slip') {
        document.querySelectorAll('.right-tab')[0].classList.add('active');
        document.getElementById('slipPanel').classList.add('active');
    } else if (tab === 'history') {
        document.querySelectorAll('.right-tab')[1].classList.add('active');
        document.getElementById('historyPanel').classList.add('active');
    }
    updateSlip();
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function switchTab(t) {
    document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.board').forEach(el=>el.classList.remove('active'));
    if(t==='single') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('singleBoard').classList.add('active');
        document.getElementById('chipSelector').style.display = 'flex';
    } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('doubleBoard').classList.add('active');
        document.getElementById('chipSelector').style.display = 'flex';
        buildDoubleBoard();
    }
}

function switchMatrix(pool) {
    currentDoublePool = pool;
    document.getElementById('btnQIN').classList.toggle('active', pool === 'QIN');
    document.getElementById('btnQPL').classList.toggle('active', pool === 'QPL');
    buildDoubleBoard();
}

async function loadRace() {
    setStatus('載入中...');
    const date = document.getElementById('dateInput').value;
    const venue = document.getElementById('venueInput').value;
    const raceno = document.getElementById('raceNoInput').value;

    try {
        const res = await fetch(`/api/race?date=${date}&venue=${venue}&raceno=${raceno}`);
        raceData = await res.json();
        if(raceData.error) throw new Error(raceData.error);

        buildSingleBoard();
        buildDoubleBoard();
        betSlip = [];
        updateSlip();
        document.getElementById('videoIframe').src = 'about:blank';
        document.getElementById('betPhase').style.display = 'flex';
        document.getElementById('videoPhase').style.display = 'none';
        document.getElementById('resultOverlay').style.display = 'none';
        document.getElementById('chipSelector').style.display = 'flex';
        setStatus('✅ 載入成功 (' + raceData.runners.length + '匹馬)');
    } catch(e) {
        setStatus('❌ '+e.message);
    }
}

function getOdds(type, comb) {
    if (raceData.dividends[type] && raceData.dividends[type][comb]) {
        return raceData.dividends[type][comb];
    }
    let o = 0;
    if (type === 'WIN') {
        const r = raceData.runners.find(x => x.no == comb);
        o = r ? parseFloat(r.winOdds) : 20.0;
    } else if (type === 'PLA') {
        const r = raceData.runners.find(x => x.no == comb);
        o = r ? parseFloat(r.winOdds)/3.5 : 5.0;
        if(o < 1.1) o = 1.1;
    } else {
        const parts = comb.split('-');
        const r1 = raceData.runners.find(x => x.no == parts[0]);
        const r2 = raceData.runners.find(x => x.no == parts[1]);
        const w1 = r1 ? parseFloat(r1.winOdds) : 20;
        const w2 = r2 ? parseFloat(r2.winOdds) : 20;
        if (type === 'QIN') {
            o = (w1 + w2) * 1.2;
            if(o < 3.0) o = 3.0;
        } else if (type === 'QPL') {
            o = ((w1 + w2) * 1.2) / 3.5;
            if(o < 1.5) o = 1.5;
        }
    }
    return parseFloat(o.toFixed(1));
}

function buildSingleBoard() {
    const b = document.getElementById('singleBoard');
    b.innerHTML = '';
    raceData.runners.forEach(r => {
        const winO = getOdds('WIN', r.no);
        const plaO = getOdds('PLA', r.no);
        const row = document.createElement('div');
        row.className = 'horse-row';
        row.innerHTML = `
            <div class="h-info">
                <div class="h-no">${r.no}</div>
                <div class="h-name">${r.name}</div>
            </div>
            <div class="odds-btn" onclick="addBet('WIN', '${r.no}', '獨贏 ${r.no}', ${winO})">
                <div class="odds-type">WIN</div>
                <div class="odds-val">${winO}</div>
            </div>
            <div class="odds-btn" onclick="addBet('PLA', '${r.no}', '位置 ${r.no}', ${plaO})">
                <div class="odds-type">PLACE</div>
                <div class="odds-val">${plaO}</div>
            </div>
        `;
        b.appendChild(row);
    });
}

function buildDoubleBoard() {
    if(!raceData) return;
    const m = document.getElementById('qinMatrix');
    const n = raceData.runners.length;
    m.style.gridTemplateColumns = `auto repeat(${n}, 1fr)`;
    m.innerHTML = '<div class="m-hdr">馬號</div>';
    for(let i=0; i<n; i++) m.innerHTML += `<div class="m-hdr">${raceData.runners[i].no}</div>`;

    for(let i=0; i<n; i++) {
        m.innerHTML += `<div class="m-hdr">${raceData.runners[i].no}</div>`;
        for(let j=0; j<n; j++) {
            if(j <= i) {
                m.innerHTML += `<div class="m-cell empty"></div>`;
            } else {
                const h1 = raceData.runners[i].no;
                const h2 = raceData.runners[j].no;
                const comb = `${h1}-${h2}`;
                const poolName = currentDoublePool === 'QIN' ? '連贏' : '位置Q';
                const odds = getOdds(currentDoublePool, comb);
                m.innerHTML += `
                    <div class="m-cell" onclick="addBet('${currentDoublePool}', '${comb}', '${poolName} ${comb}', ${odds})">
                        <div class="m-label">${currentDoublePool}</div>
                        <div class="m-val">${odds}</div>
                    </div>
                `;
            }
        }
    }
}

function addBet(type, comb, desc, odds) {
    if (credit < currentStake) {
        alert(`本金不足！餘額 $${credit.toFixed(2)}`);
        return;
    }

    betSlip.push({ 
        type, 
        comb, 
        desc, 
        odds, 
        stake: currentStake, 
        id: Date.now() 
    });
    updateSlip();
}

function removeBet(id) {
    betSlip = betSlip.filter(b => b.id !== id);
    updateSlip();
}

function updateSlip() {
    const list = document.getElementById('betSlipList');
    if(betSlip.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px">未有注項<br>揀定籌碼大小後點擊馬匹即可落注</div>';
    } else {
        list.innerHTML = betSlip.map(b => `
            <div class="bet-item">
                <div class="del" onclick="removeBet(${b.id})">X</div>
                <div class="b-title">${b.desc}</div>
                <div class="b-odds">@ ${b.odds}</div>
                <div class="b-amount">注金: $${b.stake.toLocaleString()}</div>
            </div>
        `).reverse().join('');
    }

    const total = betSlip.reduce((sum, b) => sum + b.stake, 0);
    document.getElementById('totalStake').textContent = total.toLocaleString();
    document.getElementById('credit').textContent = credit.toFixed(2);
}

function startRace() {
    if(!raceData) return alert('請先載入賽事');
    const total = betSlip.reduce((sum, b) => sum + b.stake, 0);
    if(total === 0) return alert('請最少下一注！');
    if(credit < total) return alert('本金不足！');

    credit -= total;
    localStorage.setItem(STORAGE_CREDIT, credit.toFixed(2));
    updateSlip();

    // 顯示投注成功訊息
    alert(`✅ 投注成功！\n總注金: $${total.toLocaleString()}\n剩餘本金: $${credit.toFixed(2)}\n開跑倒數中...`);

    document.getElementById('betPhase').style.display = 'none';
    document.getElementById('videoPhase').style.display = 'flex';
    document.getElementById('videoIframe').src = raceData.raceInfo.videoUrl;
}

function showResults() {
    let winMoney = 0;
    const totalStake = betSlip.reduce((sum, b) => sum + b.stake, 0);

    betSlip.forEach(b => {
        const realPayout = raceData.dividends[b.type] && raceData.dividends[b.type][b.comb];
        if (realPayout) {
            winMoney += b.stake * realPayout;
        }
    });

    // 記錄呢局投注（無論輸贏）
    bettingHistory.push({
        race: `${raceData.raceInfo.date} ${raceData.raceInfo.venue}-${raceData.raceInfo.raceno}`,
        bets: betSlip.map(bet => `${bet.desc} @${bet.odds} $${bet.stake}`),
        stake: totalStake,
        payout: winMoney,
        profit: winMoney - totalStake,
        timestamp: new Date().toLocaleString('zh-HK')
    });

    credit += winMoney;
    localStorage.setItem(STORAGE_CREDIT, credit.toFixed(2));
    localStorage.setItem(STORAGE_HISTORY, JSON.stringify(bettingHistory));

    document.getElementById('rWinMoney').textContent = '$' + winMoney.toLocaleString();

    const top4 = raceData.runners.filter(r => ['1','2','3','4'].includes(r.rank)).sort((a,b)=>parseInt(a.rank)-parseInt(b.rank));
    document.getElementById('rTop4').innerHTML = top4.map(r => `
        <div class="r-horse">
            <div class="r-rank">第 ${r.rank} 名</div>
            <div class="r-no">${r.no}</div>
        </div>
    `).join('');

    document.getElementById('resultOverlay').style.display = 'flex';
    document.getElementById('credit').textContent = credit.toFixed(2);
    updateHistoryDisplay();
}


function updateHistoryDisplay() {
    const totalPnL = bettingHistory.reduce((sum, h) => sum + h.profit, 0);
    const wins = bettingHistory.filter(h => h.profit > 0).length;
    const winRate = bettingHistory.length > 0 ? Math.round((wins / bettingHistory.length) * 100) : 0;

    document.getElementById('totalPnL').textContent = totalPnL.toLocaleString();
    document.getElementById('totalPnL').className = totalPnL >= 0 ? 'history-win' : 'history-loss';
    document.getElementById('winRate').textContent = winRate + '%';

    const list = document.getElementById('historyList');
    if (bettingHistory.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px">未有投注紀錄<br>開始落注吧！</div>';
    } else {
        list.innerHTML = bettingHistory.slice(-20).reverse().map(h => {
            // 搵出前三名用於顯示
            const top3 = raceData ? raceData.runners.filter(r => ['1','2','3'].includes(r.rank)).map(r => r.no).join('-') : '未知';

            const betsWithResult = h.bets.map(bet => {
                // 簡單判斷邊啲投注中咗 (如果有 raceData)
                let status = '';
                if (raceData) {
                    if (h.profit > 0 && (bet.includes('獨贏') || bet.includes('位置') || bet.includes('連贏') || bet.includes('位置Q'))) {
                        status = ' ✅';
                    } else {
                        status = ' ❌';
                    }
                }
                return bet + status;
            });

            return `
                <div class="history-item ${h.profit >= 0 ? 'win' : 'loss'}">
                    <div><strong>${h.race}</strong> | 前三: ${top3} | ${h.timestamp}</div>
                    <div style="margin:8px 0;color:var(--text-dim);font-size:12px">${betsWithResult.join(', ')}</div>
                    <div style="font-size:14px">
                        本金: $${h.stake.toLocaleString()} → 派彩: $${h.payout.toLocaleString()}
                        <span style="font-weight:bold;font-size:16px;color:${h.profit >= 0 ? 'var(--green)' : 'var(--red)'}">
                            ${h.profit >= 0 ? '+' : ''}$${h.profit.toLocaleString()}
                        </span>
                    </div>
                </div>
            `;
        }).join('');
    }
}

    const totalPnL = bettingHistory.reduce((sum, h) => sum + h.profit, 0);
    const wins = bettingHistory.filter(h => h.profit > 0).length;
    const winRate = bettingHistory.length > 0 ? Math.round((wins / bettingHistory.length) * 100) : 0;

    document.getElementById('totalPnL').textContent = totalPnL.toLocaleString();
    document.getElementById('totalPnL').className = totalPnL >= 0 ? 'history-win' : 'history-loss';
    document.getElementById('winRate').textContent = winRate + '%';

    const list = document.getElementById('historyList');
    if (bettingHistory.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px">未有投注紀錄<br>開始落注吧！</div>';
    } else {
        list.innerHTML = bettingHistory.slice(-20).reverse().map(h => `
            <div class="history-item ${h.profit >= 0 ? 'win' : 'loss'}">
                <div><strong>${h.race}</strong> ${h.timestamp}</div>
                <div style="margin:8px 0;color:var(--text-dim);font-size:12px">${h.bets.join(', ')}</div>
                <div style="font-size:14px">
                    本金: $${h.stake.toLocaleString()} → 派彩: $${h.payout.toLocaleString()}
                    <span style="font-weight:bold;font-size:16px;color:${h.profit >= 0 ? 'var(--green)' : 'var(--red)'}">
                        ${h.profit >= 0 ? '+' : ''}$${h.profit.toLocaleString()}
                    </span>
                </div>
            </div>
        `).join('');
    }
}

function resetBankroll() {
    if (confirm('確定要重新注資 $1000？所有歷史紀錄都會清空！')) {
        credit = 1000.00;
        bettingHistory = [];
        localStorage.setItem(STORAGE_CREDIT, credit.toFixed(2));
        localStorage.setItem(STORAGE_HISTORY, JSON.stringify(bettingHistory));
        updateSlip();
        updateHistoryDisplay();
    }
}

function resetGame() {
    betSlip = [];
    updateSlip();
    document.getElementById('videoIframe').src = 'about:blank';
    document.getElementById('resultOverlay').style.display = 'none';
    document.getElementById('videoPhase').style.display = 'none';
    document.getElementById('betPhase').style.display = 'flex';
}

// 頁面載入時初始化
initGame();
</script>
